{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h1 class="text-center mb-5">Select a User Profile</h1>

        <div class="list-group shadow">
            {% for user in users %}
            <a href="{{ url_for('show_movies', user_id=user.id) }}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center p-3">
                <div>
                    <span class="fs-5 fw-bold">{{ user.username }}</span>
                    <div class="text-secondary small">{{ user.users.count() }} movies in collection</div>
                </div>
                <span class="badge bg-info rounded-pill text-dark px-3">View Library</span>
            </a>
            {% endfor %}
        </div>

        <div class="card mt-5 p-4 border-info border-opacity-25 shadow-lg">
            <h5 class="mb-3">Create New Profile</h5>
            <form action="{{ url_for('add_user') }}" method="POST" class="input-group">
                <input type="text" name="name" class="form-control" placeholder="Choose a username..." required>
                <button class="btn btn-primary" type="submit">Create User</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
