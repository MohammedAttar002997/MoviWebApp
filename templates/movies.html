{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h2 text-white">{{ user.username }}'s Library</h1>
    <div class="col-md-4">
        <input type="text" id="movieSearch" class="form-control bg-dark text-white border-secondary" placeholder="🔍 Filter your collection...">
    </div>
</div>

<div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" id="movieGrid">
    {% for movie in movies %}
    <div class="col movie-card-container">
        <div class="card h-100 shadow-sm">
            <img src="{{ movie.poster }}" class="card-img-top" alt="poster" style="aspect-ratio: 2/3; object-fit: cover;">
            <div class="card-body">
                <h5 class="card-title text-truncate movie-title">{{ movie.name }}</h5>
                <p class="card-text text-secondary small">{{ movie.year }} • {{ movie.director }}</p>
            </div>
            <div class="card-footer bg-transparent border-top-0 d-flex gap-2">
                <a href="{{ url_for('update_movie', user_id=user.id, movie_id=movie.id) }}" class="btn btn-sm btn-outline-info w-100">Edit</a>
                <form action="{{ url_for('delete_movie', user_id=user.id, movie_id=movie.id) }}" method="POST" class="w-100">
                    <button type="submit" class="btn btn-sm btn-outline-danger w-100" onclick="return confirm('Delete?')">Delete</button>
                </form>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<script>
    document.getElementById('movieSearch').addEventListener('keyup', function() {
        let filter = this.value.toLowerCase();
        let cards = document.querySelectorAll('.movie-card-container');

        cards.forEach(card => {
            let title = card.querySelector('.movie-title').textContent.toLowerCase();
            if (title.includes(filter)) {
                card.style.display = ""; // Show
            } else {
                card.style.display = "none"; // Hide
            }
        });
    });
</script>
{% endblock %}
